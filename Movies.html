<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Browse movies based on your mood">
  <meta name="keywords" content="movies, film suggestions, mood movies">

<link rel="stylesheet" href="style.css">

  <title>Movies</title>

  </head>

<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movies</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

  <h1>Your Movies</h1>

  <!-- Movies Container -->
  <div class="movies-container" id="movies"></div>

  <!-- JavaScript -->
  <script>
  const API_KEY = "d7cabe74";
  const mood = (localStorage.getItem("selectedMood") || "action").toLowerCase();

  const moviesContainer = document.getElementById("movies");

  fetch(`https://www.omdbapi.com/?s=${mood}&apikey=${API_KEY}`)
    .then(response => response.json())
    .then(data => {

      if (data.Search) {

        let found = false;

        data.Search.forEach(movie => {
          fetch(`https://www.omdbapi.com/?i=${movie.imdbID}&apikey=${API_KEY}`)
            .then(res => res.json())
            .then(details => {

              if (details.Genre && details.Genre.toLowerCase().includes(mood)) {

                found = true;

                const movieCard = document.createElement("div");
                movieCard.classList.add("movie-card");

                movieCard.innerHTML = `
                  <img src="${details.Poster}" alt="${details.Title}">
                  <h3>${details.Title}</h3>
                  <p>${details.Year}</p>
                  <button onclick="watchTrailer('${details.Title}')">Watch Trailer</button>
                `;

                moviesContainer.appendChild(movieCard);
              }

            });
        });

        // fallback if nothing matched
        setTimeout(() => {
          if (!found) {
            moviesContainer.innerHTML = "<p>No matching movies found. Try another mood.</p>";
          }
        }, 1500);

      } else {
        moviesContainer.innerHTML = "<p>No movies found.</p>";
      }

    });

  function watchTrailer(title) {
    const query = title + " trailer";
    const url = "https://www.youtube.com/results?search_query=" + query;
    window.open(url, "_blank");
  }
</script>
